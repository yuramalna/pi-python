name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build pi-ai
        run: python -m build packages/pi_ai

      - name: Build pi-ai-agent
        run: python -m build packages/pi_agent

      - name: Publish pi-ai
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pi_ai/dist/

      - name: Publish pi-ai-agent
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pi_agent/dist/
