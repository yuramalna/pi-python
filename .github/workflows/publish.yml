name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && contains(github.event.base_ref, 'main') || github.sha == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git branch --contains "$GITHUB_SHA" | grep -q 'main' || {
            echo "Tag is not on main branch. Aborting."
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build pi-llm
        run: python -m build packages/pi_llm

      - name: Build pi-llm-agent
        run: python -m build packages/pi_llm_agent

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload packages/pi_llm/dist/*
          twine upload packages/pi_llm_agent/dist/*
