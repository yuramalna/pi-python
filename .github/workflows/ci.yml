name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/pi_ai[dev]"
          pip install -e "packages/pi_agent[dev]"
          pip install mkdocs-material 'mkdocstrings[python]' mkdocs-gen-files mkdocs-section-index

      - name: Lint with ruff
        run: |
          ruff check packages/pi_ai/src/ packages/pi_agent/src/

      - name: Test pi-ai
        run: |
          pytest packages/pi_ai/tests/ --ignore=packages/pi_ai/tests/integration -v --tb=short

      - name: Test pi-agent
        run: |
          pytest packages/pi_agent/tests/ --ignore=packages/pi_agent/tests/integration -v --tb=short

      - name: Build docs
        run: |
          mkdocs build
